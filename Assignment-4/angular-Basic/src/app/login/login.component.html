<div class="login-wrapper">
  <div class="login-card">
    <h3>Welcome Back</h3>
    <p class="subtitle">Please enter your details to sign in.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email Address <span class="text-danger">*</span></label>
        <input type="email" id="email" formControlName="email" autocomplete="email">
        <div class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
          Email is required.
        </div>
        <div class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password <span class="text-danger">*</span></label>
        <input type="password" id="password" formControlName="password" autocomplete="current-password">
        <div class="error-msg" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required.
        </div>
      </div>

      <div class="form-actions">
        <label class="checkbox-label">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!loginForm.valid">
        Sign In
      </button>
      
      <p class="switch-page">
        Don't have an account? <a routerLink="/register">Register here</a>
      </p>

    </form>
  </div>
</div>
